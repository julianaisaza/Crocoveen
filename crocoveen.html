<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crocoveen — Tierra Grata &amp; Co.</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f0;color:#333;min-height:100vh}
.hdr{background:#0D3D52;color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.hdr-logo{width:40px;height:40px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#0D3D52;flex-shrink:0;margin-right:12px}
.hdr-title{font-weight:700;font-size:17px}
.hdr-sub{font-size:11px;color:#a5d6a7;margin-top:2px}
.hdr-right{font-size:11px;color:#81c784;text-align:right;line-height:1.6}
.nav{background:#fff;border-bottom:1px solid #e0e0e0;display:flex;padding:0 12px;overflow-x:auto}
.ntab{padding:13px 20px;cursor:pointer;border-bottom:3px solid transparent;font-weight:500;font-size:14px;color:#666;white-space:nowrap;user-select:none;transition:background .15s}
.ntab:hover{color:#2e7d32;background:#f1f8e9}
.ntab.active{color:#2e7d32;border-bottom-color:#2e7d32;font-weight:700}
.page{padding:20px 24px}
/* filter bar */
.filter-bar{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:14px 18px;margin-bottom:20px}
.filter-label{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.filter-pills{display:flex;flex-wrap:wrap;gap:7px}
.pill{border:1px solid #ddd;border-radius:20px;padding:5px 13px;font-size:12px;font-weight:600;cursor:pointer;user-select:none;transition:all .15s;background:#fff;color:#555}
.pill:hover{border-color:#2e7d32;color:#2e7d32}
.pill.on{background:#2e7d32;color:#fff;border-color:#2e7d32}
/* stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
@media(max-width:800px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:#fff;border-radius:12px;padding:16px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #eee}
.stat-val{font-size:28px;font-weight:800;line-height:1}
.stat-lbl{font-size:11px;color:#999;margin-top:5px;font-weight:500}
/* project sections */
.proj-section{margin-bottom:26px}
.proj-hdr{font-size:15px;font-weight:700;color:#333;margin-bottom:12px;display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:2px solid #eee}
.proj-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.towers-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:1100px){.towers-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:800px){.towers-grid{grid-template-columns:repeat(2,1fr)}}
.tower-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #eee;transition:box-shadow .2s}
.tower-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.tc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.tc-name{font-size:14px;font-weight:700;color:#222}
.prog-labels{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.prog-track{background:#f0f0f0;border-radius:99px;height:9px;position:relative;overflow:visible;margin-bottom:2px}
.prog-fill{height:100%;border-radius:99px;transition:width .3s}
.prog-60{position:absolute;top:-3px;bottom:-3px;width:2px;background:#e65100;opacity:.4;left:60%;border-radius:2px}
.prog-70{position:absolute;top:-3px;bottom:-3px;width:2px;background:#fb8c00;opacity:.65;left:70%;border-radius:2px}
.prog-lbl{font-size:9px;color:#aaa;text-align:right;margin-bottom:8px}
.mini-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.mini{border-radius:7px;padding:6px;text-align:center}
.mini-lbl{font-size:10px;color:#aaa}
.mini-val{font-size:12px;font-weight:700;margin-top:1px}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.b-ventas{background:#dcedc8;color:#33691e}
.b-const{background:#cfd8dc;color:#37474f}
.b-entr{background:#fce4ec;color:#880e4f}
.b-comp{background:#bbdefb;color:#0d47a1}
.b-pend{background:#f5f5f5;color:#888}
.hint{margin-top:8px;padding:6px 10px;border-radius:7px;font-size:11px;font-weight:500;line-height:1.4}
.hint-orange{background:#fff3e0;color:#e65100}
.hint-amber{background:#fff8e1;color:#f57f17}
.hint-green{background:#f1f8e9;color:#2e7d32}
.hint-blue{background:#e8eaf6;color:#283593;border-left:3px solid #5c6bc0;padding-left:8px}
.alert-box{border-left:4px solid #f57f17;background:#fffde7;padding:10px 16px;border-radius:4px;font-size:13px;color:#e65100;font-weight:500;margin-bottom:8px}
.sec-title{font-size:12px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
/* buttons */
.btn{border:none;border-radius:8px;padding:8px 18px;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;font-family:inherit}
.btn:disabled{opacity:.35;cursor:default}
.btn-out{background:#fff;border:1px solid #ddd;color:#444}
.btn-out:not(:disabled):hover{background:#f5f5f5}
.btn-grn{background:#2e7d32;color:#fff}
.btn-grn:not(:disabled):hover{background:#1b5e20}
.btn-sm{padding:5px 12px;font-size:12px}
/* settings bar */
.settings-bar{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:12px 18px;margin-bottom:12px;flex-wrap:wrap}
.settings-label{font-size:12px;font-weight:600;color:#555}
.fi-sm{border:1px solid #ddd;border-radius:7px;padding:6px 10px;font-size:13px;font-family:inherit;outline:none;color:#333}
.fi-sm:focus{border-color:#2e7d32}
/* croco filter */
.croco-filter{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.croco-pill{border:1px solid #ddd;border-radius:16px;padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;user-select:none;background:#fff;color:#555;transition:all .15s}
.croco-pill:hover{border-color:#2e7d32;color:#2e7d32}
.croco-pill.on{background:#2e7d32;color:#fff;border-color:#2e7d32}
/* legend */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#555}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
/* croco table */
.croco-wrap{overflow:auto;max-height:calc(100vh - 255px);background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #eee}
table.ct{border-collapse:collapse;font-size:11px;white-space:nowrap}
table.ct th,table.ct td{border:1px solid #e8e8e8;padding:3px 6px;text-align:center;min-width:32px}
table.ct .lbl{text-align:left;width:168px;min-width:168px;position:sticky;left:0;z-index:3;background:#fff;font-weight:600;padding-left:10px;font-size:11px}
table.ct thead th{position:sticky;top:0;z-index:4;background:#fff}
table.ct .th-yr{background:#0d47a1;color:#fff;font-size:12px;padding:4px 8px;font-weight:700}
/* month row: sticky but offset below the year row (~28px) */
table.ct .th-mo{top:28px;background:#fff;color:#666;font-size:10px;padding:3px 4px;border-bottom:2px solid #e0e0e0}
table.ct .th-mo.cur{top:28px;background:#e8f5e9;color:#2e7d32;font-weight:700;border-bottom-color:#2e7d32}
/* sticky info panel (single cell: Total / Vendidas / Disponibles) */
.th-inf-panel{background:#fff;color:#546e7a;font-size:10px;padding:3px 8px;text-align:center;font-weight:700;width:100px;min-width:100px;border-left:2px solid #cfd8dc;border-right:2px solid #cfd8dc;border-bottom:2px solid #e0e0e0}
.td-inf-panel{background:#fafafa;vertical-align:middle;padding:3px 5px;width:100px;min-width:100px;border-left:2px solid #cfd8dc;border-right:2px solid #cfd8dc}
.inf-row{display:flex;justify-content:space-between;align-items:center;gap:5px;padding:2px 4px;border-radius:3px;margin:1px 0}
.inf-tot-r{background:#f0f0f0}
.inf-sld-r{background:#e8f5e9;cursor:pointer}
.inf-sld-r:hover{background:#c8e6c9}
.inf-dsp-r{background:#e3f2fd}
.inf-lbl{font-size:9px;color:#999;font-weight:600;white-space:nowrap}
.inf-num{font-size:12px;font-weight:800}
.inf-num-tot{color:#444}
.inf-num-sld{color:#2e7d32}
.inf-num-dsp{color:#1565c0}
.lbl-sales{background:#f1f8e9;color:#1b5e20}
.lbl-acum{background:#f9fbe7;color:#33691e}
.lbl-pct{background:#fffde7;color:#e65100}
.lbl-con{background:#f5f5f5;color:#546e7a}
.lbl-del{background:#fce4ec;color:#880e4f}
.lbl-hit{background:#e3f2fd;color:#0d47a1}
.t-hdr{color:#fff;font-weight:700;font-size:12px;text-align:left;padding:5px 10px;cursor:default}
.c-sales{background:#c8e6c9;color:#1b5e20;font-weight:700;cursor:pointer}
.c-sales:hover{background:#a5d6a7}
.c-acum{color:#33691e;font-size:11px;font-weight:600}
.c-pe{background:#fb8c00;color:#fff;font-weight:800;font-size:10px}
.c-p60{background:#fff9c4;color:#e65100;font-size:10px}
.c-p70{background:#ffe0b2;color:#bf360c;font-size:10px}
.c-con{background:#b0bec5;color:#37474f;font-weight:700}
.c-econ{background:#b2dfdb;color:#004d40;font-weight:700}
.c-del{background:#f48fb1;color:#880e4f;font-weight:700;cursor:pointer}
.c-del:hover{background:#f06292}
.c-hit{background:#bbdefb;color:#0d47a1;font-size:9px;font-weight:700;cursor:pointer}
.c-hit:hover{background:#90caf9}
.cv-cell.sel{outline:2px solid #0D3D52 !important;background:rgba(13,61,82,0.13) !important;position:relative;z-index:1}
.croco-statsbar{display:none;position:sticky;bottom:0;left:0;right:0;background:#0D3D52;color:#fff;padding:6px 16px;font-size:12px;font-weight:600;border-top:2px solid #07253a;user-select:none;border-radius:0 0 12px 12px;z-index:20}
.c-hit-add{color:#90caf9;cursor:pointer;font-size:10px}
.c-hit-add:hover{background:#e3f2fd}
.c-sep{background:#f9fbe7;height:4px;padding:0}
.c-edit-cell{background:#fff9c4;outline:2px solid #fb8c00}
.cell-input{width:34px;border:none;background:transparent;text-align:center;font-size:11px;font-weight:700;font-family:inherit;outline:none;color:#1b5e20}
.del-input{width:34px;border:none;background:transparent;text-align:center;font-size:11px;font-weight:700;font-family:inherit;outline:none;color:#880e4f}
.sold-underline{cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px}
.sold-input{width:44px;border:1px solid #ccc;border-radius:4px;background:#fff;text-align:center;font-size:12px;font-weight:700;font-family:inherit;outline:none;color:#2e7d32;padding:1px 4px}
/* hito tags */
.hito-tag{display:inline-flex;align-items:center;gap:2px;margin:0 1px}
.hito-x{color:#ef9a9a;cursor:pointer;font-size:10px;margin-left:1px}
.hito-x:hover{color:#e53935}
/* registrar */
.area-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
@media(max-width:700px){.area-grid{grid-template-columns:1fr}}
.area-card{background:#fff;border:2px solid #e0e0e0;border-radius:14px;padding:22px;cursor:pointer;transition:all .18s}
.area-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.1);transform:translateY(-2px)}
.ac-icon{font-size:28px;margin-bottom:8px}
.ac-title{font-size:16px;font-weight:700;color:#222;margin-bottom:5px}
.ac-desc{font-size:13px;color:#888;line-height:1.5;margin-bottom:12px}
.ac-link{font-size:12px;font-weight:700}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:14px;padding:26px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.modal-title{font-size:18px;font-weight:700}
.modal-sub{font-size:13px;color:#aaa;margin-top:3px}
.modal-x{background:none;border:none;font-size:26px;cursor:pointer;color:#ccc;line-height:1;padding:0 4px;font-family:inherit}
.modal-x:hover{color:#888}
.fg{margin-bottom:15px}
.fl{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:4px}
.fi{width:100%;border:1px solid #ddd;border-radius:8px;padding:9px 12px;font-size:14px;outline:none;font-family:inherit}
.fi:focus{border-color:#2e7d32;box-shadow:0 0 0 3px rgba(46,125,50,.1)}
.fhint{font-size:11px;color:#bbb;margin-top:3px}
.finfo{border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:12px;line-height:1.5}
.finfo-green{background:#f1f8e9;color:#2e7d32}
.finfo-blue{background:#e3f2fd;color:#1565c0}
.finfo-gray{background:#f5f5f5;color:#546e7a}
.form-btns{display:flex;gap:12px;margin-top:4px}
/* procesos timeline */
.proc-timeline{display:flex;flex-direction:column;gap:14px}
.proc-month{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #eee}
.proc-month-hdr{font-size:15px;font-weight:800;color:#1b5e20;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e8f5e9;display:flex;align-items:center;gap:8px}
.proc-month-hdr::before{content:'';display:inline-block;width:10px;height:10px;border-radius:50%;background:#2e7d32;flex-shrink:0}
.proc-items{display:flex;flex-direction:column;gap:6px}
.proc-item{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:7px 10px;border-radius:8px;background:#fafafa;border:1px solid #f0f0f0}
.proc-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.proc-text{font-size:13px;font-weight:600;color:#333}
.proc-tower{font-size:12px;font-weight:600}
.proc-proj{font-size:11px;color:#aaa;font-weight:500}
.proc-desc{font-size:11px;color:#999;font-style:italic;flex-basis:100%;padding-left:2px}
/* toast */
.toast{position:fixed;top:20px;right:20px;background:#1a2a1a;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.3);z-index:999;max-width:340px;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
/* tareas */
.tk-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.tk-lbl{font-size:18px;font-weight:800;color:#222}
.tk-stats{display:flex;gap:8px}
.tk-n{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid #ddd;background:#fff;color:#888;transition:all .15s;font-family:inherit}
.tk-n.tk-pend{background:#2e7d32;color:#fff;border-color:#2e7d32}
.tk-n:hover{border-color:#2e7d32;color:#2e7d32}
.tk-n.tk-pend:hover{background:#1b5e20;border-color:#1b5e20;color:#fff}
.tk-add{background:#2e7d32;color:#fff;border:none;border-radius:8px;padding:7px 16px;cursor:pointer;font-size:13px;font-weight:600;transition:background .15s;font-family:inherit}
.tk-add:hover{background:#1b5e20}
.tk-section{margin-bottom:20px;border-radius:10px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.tk-sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;user-select:none}
.tk-proj-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;margin-right:8px;background:rgba(255,255,255,.35)}
.tk-proj-name{font-size:13px;font-weight:700;color:#fff}
.tk-proj-cnt{font-size:11px;color:rgba(255,255,255,.65);margin-left:8px}
.tk-body{background:#fff;border:1px solid #eee;border-top:none}
.tk-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid #f5f5f5;transition:background .12s}
.tk-row:last-child{border-bottom:none}
.tk-row:hover{background:#fafafa}
.tk-row-done{opacity:.5}
.tk-circle{width:22px;height:22px;border-radius:50%;border:2px solid #ccc;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:#fff}
.tk-circle:hover{border-color:#2e7d32}
.tk-circle-done{background:#2e7d32;border-color:#2e7d32}
.tk-task-name{font-size:13px;font-weight:600;color:#333;flex:1}
.tk-row-done .tk-task-name{text-decoration:line-through;color:#bbb}
.tk-stk{font-size:11px;color:#aaa;font-weight:500;margin-left:6px}
.tk-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tk-date{font-size:12px;font-weight:600;color:#666}
.tk-over{color:#c62828;font-weight:700}
.tk-soon{color:#e65100;font-weight:700}
.tk-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;white-space:nowrap}
.bdg-rph{background:#e8eaf6;color:#283593}
.bdg-lic{background:#f3e5f5;color:#6a1b9a}
.bdg-pe{background:#fff3e0;color:#e65100}
.bdg-obra{background:#e0f2f1;color:#00695c}
.bdg-ent{background:#fce4ec;color:#880e4f}
.bdg-def{background:#f5f5f5;color:#546e7a}
.tk-empty{padding:40px;text-align:center;color:#bbb;font-size:14px;background:#fff;border-radius:10px;border:1px solid #eee}
/* person / owner */
.tk-avatar{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0;cursor:default;border:2px solid rgba(255,255,255,.6);letter-spacing:-.5px}
.tk-avatar-empty{background:#ececec;color:#bbb;border:2px dashed #d0d0d0;font-size:14px;cursor:pointer}
.tk-avatar-empty:hover{background:#e0e0e0}
.tk-owner-sel{border:1px solid #e0e0e0;border-radius:20px;background:#fff;font-size:11px;color:#555;font-family:inherit;cursor:pointer;outline:none;padding:3px 8px;max-width:120px;transition:border-color .15s}
.tk-owner-sel:focus,.tk-owner-sel:hover{border-color:#2e7d32}
/* equipo modal */
.eq-person{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;background:#fafafa;border:1px solid #eee;margin-bottom:7px}
.eq-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;letter-spacing:-.5px}
.eq-name{flex:1;font-size:14px;font-weight:600;color:#333}
.eq-remove{background:none;border:none;cursor:pointer;color:#ccc;font-size:20px;line-height:1;padding:0 4px;font-family:inherit;transition:color .15s}
.eq-remove:hover{color:#e53935}

/* ── LOGIN OVERLAY ─────────────────────────────────── */
#login-overlay{position:fixed;inset:0;z-index:9999;background:rgba(13,61,82,.92);
  display:flex;align-items:center;justify-content:center;
  font-family:'Segoe UI',Arial,sans-serif;backdrop-filter:blur(4px)}
#login-box{background:#fff;border-radius:16px;padding:44px 40px 36px;
  width:340px;box-shadow:0 8px 40px rgba(0,0,0,.35);text-align:center}
#login-logo{font-size:36px;margin-bottom:6px}
#login-title{font-size:20px;font-weight:700;color:#0D3D52;margin-bottom:4px}
#login-sub{font-size:13px;color:#888;margin-bottom:28px}
#login-pw{width:100%;box-sizing:border-box;padding:11px 14px;font-size:15px;
  border:1.5px solid #ddd;border-radius:8px;outline:none;margin-bottom:14px;
  transition:border .2s}
#login-pw:focus{border-color:#007060}
#login-btn{width:100%;padding:12px;background:#0D3D52;color:#fff;border:none;
  border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;
  transition:background .2s}
#login-btn:hover{background:#007060}
#login-err{color:#c62828;font-size:13px;margin-top:10px;min-height:18px}
</style>
</head>
<body>
<div id="login-overlay">
  <div id="login-box">
    <div id="login-logo">🌿</div>

// ── HELPERS ────────────────────────────────────────────
function cumSold(t,upTo){
  let c=t.sold;
  for(const[m,v] of Object.entries(S.rhythm[t.id]||{}))
    if(m>S.currentDate&&m<=upTo) c+=(v||0);
  return Math.min(c,t.tot);
}

function beMon(t){
  const tgt=t.tot*0.7;
  if(t.sold>=tgt) return 'already';
  let c=t.sold;
  for(const m of MONTHS){
    if(m<=S.currentDate) continue;
    c+=(S.rhythm[t.id]||{})[m]||0;
    if(c>=tgt) return m;
  }
  return null;
}

function mBetween(s,e){
  if(!s||!e||s>e) return new Set();
  const r=new Set();
  let[y,m]=s.split('-').map(Number);
  const[ey,em]=e.split('-').map(Number);
  while(y<ey||(y===ey&&m<=em)){r.add(`${y}-${String(m).padStart(2,'0')}`);if(++m>12){m=1;y++;}}
  return r;
}

// UPDATED STATUS: based on current month state
function status(t){
  // 1. Currently under construction?
  const c=S.constr[t.id];
  if(c&&S.currentDate>=c.start&&S.currentDate<=c.end) return 'const';
  // 2. Active delivery phase: deliveries have started AND are still ongoing
  const del=S.deliveries[t.id]||{};
  const dms=Object.keys(del).sort();
  if(dms.length&&dms[0]<=S.currentDate&&dms[dms.length-1]>=S.currentDate) return 'entr';
  // 3. Fully sold and delivery done
  if(t.sold>=t.tot) return 'comp';
  // 4. Sales have started: sold>0 OR rhythm has entries at or before currentDate
  const rhm=S.rhythm[t.id]||{};
  if(t.sold>0||Object.keys(rhm).some(m=>m<=S.currentDate)) return 'ventas';
  return 'pend';
}

function badge(s){
  const M={ventas:['b-ventas','Preventas'],const:['b-const','Construcción'],entr:['b-entr','Entregas'],comp:['b-comp','Completado'],pend:['b-pend','Pendiente']};
  const[c,l]=M[s]||M.pend;
  return `<span class="badge ${c}">${l}</span>`;
}

function moOpts(sel,minM,maxM){
  return MONTHS.filter(m=>(!minM||m>=minM)&&(!maxM||m<=maxM))
    .map(m=>`<option value="${m}"${m===sel?' selected':''}>${ml(m)}</option>`).join('');
}
function tOptsByProj(proj){
  return S.towers.filter(t=>!proj||t.proj===proj)
    .map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
}

// Compute visible months for Crocoveen (ALL data months for shown towers)
function getVisMonths(shown){
  let maxM=addM(S.currentDate,2);
  for(const t of shown){
    for(const m of Object.keys(S.rhythm[t.id]||{})) if(m>maxM) maxM=m;
    for(const m of Object.keys(S.deliveries[t.id]||{})) if(m>maxM) maxM=m;
    const c=S.constr[t.id];if(c&&c.end>maxM) maxM=c.end;
    if(c&&c.eEnd&&c.eEnd>maxM) maxM=c.eEnd;
  }
  if(maxM>MONTHS[MONTHS.length-1]) maxM=MONTHS[MONTHS.length-1];
  return MONTHS.filter(m=>m>=S.currentDate&&m<=maxM);
}

const ALL_PROJS=[...new Set(S.towers.map(t=>t.proj))];

// ── EQUIPO (personas responsables) ────────────────────
function getPeople(){return SBC.people;}
function getOwners(){return SBC.owners;}
function setOwner(taskId,person){
  if(person)SBC.owners[taskId]=person;else delete SBC.owners[taskId];
  draw();
  if(person)sbUpsert('task_owners',{task_id:taskId,owner:person,updated_at:new Date().toISOString()});
  else sbDel('task_owners','task_id=eq.'+encodeURIComponent(taskId));
}
function buildEqList(){
  const people=getPeople();
  if(!people.length) return `<div style="color:#bbb;font-size:13px;text-align:center;padding:16px 0">Aún no hay personas configuradas</div>`;
  return people.map((p,i)=>`<div class="eq-person">
    <div class="eq-avatar" style="background:${personColor(p)}">${personInitials(p)}</div>
    <div class="eq-name">${p}</div>
    <button class="eq-remove" onclick="removePerson(${i})" title="Eliminar">×</button>
  </div>`).join('');
}
function addPerson(name){
  const n=name.trim();
  if(n&&!SBC.people.includes(n)){
    SBC.people.push(n);
    sbUpsert('team_people',{name:n,created_at:new Date().toISOString()});
  }
  setTimeout(()=>{openM('equipo');draw();},0);
}
function removePerson(idx){
  const name=SBC.people[idx];
  if(name===undefined) return;
  SBC.people.splice(idx,1);
  for(const k of Object.keys(SBC.owners))if(SBC.owners[k]===name)delete SBC.owners[k];
  sbDel('team_people','name=eq.'+encodeURIComponent(name));
  sbDel('task_owners','owner=eq.'+encodeURIComponent(name));
  setTimeout(()=>{openM('equipo');draw();},0);
}
function personColor(name){let h=0;for(const c of name)h=(h*37+c.charCodeAt(0))%360;return `hsl(${h},42%,42%)`;}
function personInitials(name){return name.trim().split(/\s+/).map(w=>w[0].toUpperCase()).slice(0,2).join('');}
function rAvatar(name,size){const sz=size||26;return `<span class="tk-avatar" style="width:${sz}px;height:${sz}px;background:${personColor(name)}" title="${name}">${personInitials(name)}</span>`;}

// ── DASHBOARD ──────────────────────────────────────────
function rDash(){
  const shown=S.projFilter.length?S.towers.filter(t=>S.projFilter.includes(t.proj)):S.towers;
  const tU=shown.reduce((s,t)=>s+t.tot,0);
  const tS=shown.reduce((s,t)=>s+t.sold,0);

  const alertsHtml=shown.filter(t=>{const p=t.sold/t.tot;return p>=0.6&&p<0.7&&status(t)==='ventas';})
    .map(t=>`<div class="alert-box">⚠️ <strong>${t.name}</strong> — ${(t.sold/t.tot*100).toFixed(1)}% vendido, acercándose al punto de equilibrio</div>`).join('');

  const stats=[['Total unidades',tU,'#444'],['Vendidas',tS,'#2e7d32'],['Disponibles',tU-tS,'#1565c0'],['Avance general',((tS/tU*100)||0).toFixed(1)+'%','#fb8c00']]
    .map(([l,v,c])=>`<div class="stat-card"><div class="stat-val" style="color:${c}">${v}</div><div class="stat-lbl">${l}</div></div>`).join('');

  function tCard(t){
    const pct=t.sold/t.tot;
    const atBE=pct>=0.7,near=pct>=0.6&&pct<0.7;
    const be=beMon(t);
    const st=status(t);
    let peHint='';
    if(atBE&&st==='ventas') peHint=`<div class="hint hint-orange">🚦 Punto de equilibrio alcanzado</div>`;
    else if(near&&st==='ventas') peHint=`<div class="hint hint-amber">⚠️ Acercándose al PE (70%)</div>`;
    else if(st==='ventas'&&be&&be!=='already') peHint=`<div class="hint hint-green">📈 PE proyectado: <strong>${ml(be)}</strong></div>`;
    else if(st==='const'){const c=S.constr[t.id];peHint=`<div class="hint hint-green">🏗 En construcción: ${ml(c.start)} – ${ml(c.end)}</div>`;}
    else if(st==='entr'){const dms=Object.keys(S.deliveries[t.id]||{}).sort();peHint=`<div class="hint hint-orange">🏠 Entregas desde ${ml(dms[0])}</div>`;}
    // Upcoming milestones
    const upMil=S.milestones.filter(x=>x.tid===t.id&&x.date>=S.currentDate).sort((a,b)=>a.date.localeCompare(b.date));
    const milHtml=upMil.map(m=>`<div class="hint hint-blue">📌 <strong>${ml(m.date)}</strong>: ${m.type}</div>`).join('');
    const fc=atBE?'#fb8c00':near?'#f57f17':'#2e7d32';
    return `<div class="tower-card">
      <div class="tc-top"><div class="tc-name">${t.name}</div>${badge(st)}</div>
      <div class="prog-labels"><span style="font-size:12px;color:#aaa">Avance ventas</span><span style="font-size:13px;font-weight:700;color:${fc}">${(pct*100).toFixed(1)}%</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${Math.min(pct*100,100)}%;background:${fc}"></div><div class="prog-60"></div><div class="prog-70"></div></div>
      <div class="prog-lbl">60% · 70% PE</div>
      <div class="mini-row">
        <div class="mini" style="background:#f5f5f5"><div class="mini-lbl">Total</div><div class="mini-val" style="color:#444">${t.tot}</div></div>
        <div class="mini" style="background:#f1f8e9"><div class="mini-lbl">Vendidos</div><div class="mini-val" style="color:#2e7d32">${t.sold}</div></div>
        <div class="mini" style="background:#e3f2fd"><div class="mini-lbl">Disponibles</div><div class="mini-val" style="color:#1565c0">${t.tot-t.sold}</div></div>
      </div>${peHint}${milHtml}
    </div>`;
  }

  const projsToShow=S.projFilter.length?ALL_PROJS.filter(p=>S.projFilter.includes(p)):ALL_PROJS;
  const projSections=projsToShow.map(proj=>{
    const cards=shown.filter(t=>t.proj===proj).map(tCard).join('');
    if(!cards) return '';
    const col=PC[proj]||'#2e7d32';
    return `<div class="proj-section"><div class="proj-hdr"><div class="proj-dot" style="background:${col}"></div><span>${proj}</span></div><div class="towers-grid">${cards}</div></div>`;
  }).join('');

  const allOn=S.projFilter.length===0;
  const pills=`<div class="pill ${allOn?'on':''}" onclick="togglePF(null)">Todos</div>`
    +ALL_PROJS.map(p=>{const col=PC[p]||'#2e7d32';const on=S.projFilter.includes(p);return `<div class="pill ${on?'on':''}" style="${on?`background:${col};border-color:${col}`:`color:${col};border-color:${col}`}" onclick="togglePF('${p}')">${p}</div>`;}).join('');

  return `<div class="filter-bar"><div class="filter-label">Filtrar por proyecto</div><div class="filter-pills">${pills}</div></div>
    ${alertsHtml?`<div style="margin-bottom:18px"><div class="sec-title">⚡ Alertas — torres entre 60% y 70%</div>${alertsHtml}</div>`:''}
    <div class="stats-row">${stats}</div>${projSections}`;
}
function togglePF(proj){
  if(proj===null){S.projFilter=[];}else{const i=S.projFilter.indexOf(proj);if(i>=0)S.projFilter.splice(i,1);else S.projFilter.push(proj);}
  draw();
}

// ── CROCOVEEN ──────────────────────────────────────────
function rCroco(){
  const shown=S.crocoProjFilter.length?S.towers.filter(t=>S.crocoProjFilter.includes(t.proj)):S.towers;
  const vis=getVisMonths(shown);
  if(!vis.length) return '<p style="padding:20px;color:#aaa">No hay datos para mostrar.</p>';

  const yg={};
  vis.forEach(m=>{const y=m.slice(0,4);yg[y]=(yg[y]||0)+1;});
  const thYr=`<th class="lbl" rowspan="2" style="top:0;z-index:6;background:#fff;border-bottom:2px solid #e0e0e0">Año / Mes</th>`
    +`<th class="th-inf-panel" rowspan="2">Unidades</th>`
    +Object.entries(yg).map(([y,n])=>`<th class="th-yr" colspan="${n}">${y}</th>`).join('');
  const thMo=vis.map(m=>`<th class="th-mo${m===S.currentDate?' cur':''}">${MN[+m.split('-')[1]-1]}</th>`).join('');

  let rows='',ri=0;
  for(const t of shown){
    const col=PC[t.proj]||'#2e7d32';
    const _c=S.constr[t.id];
    const cM=_c?mBetween(_c.start,_c.end):new Set();
    const eM=(_c&&_c.eEnd)?mBetween(addM(_c.end,1),_c.eEnd):new Set();
    const del=S.deliveries[t.id]||{};
    const rhm=S.rhythm[t.id]||{};
    const mil=S.milestones.filter(x=>x.tid===t.id);

    // HEADER ROW — tower name only (info columns handled by rowspan below)
    rows+=`<tr><td class="t-hdr" style="background:${col};text-align:left" colspan="${vis.length+2}">${t.proj} &nbsp;›&nbsp; ${t.name}</td></tr>`;

    // Info panel cell content (read-only — data comes from Excel sync)
    const soldRow=`<div class="inf-row inf-sld-r"><span class="inf-lbl">Vendidas</span><span class="inf-num inf-num-sld">${t.sold}</span></div>`;
    const infPanel=`<td class="td-inf-panel" rowspan="6">`
      +`<div class="inf-row inf-tot-r"><span class="inf-lbl">Total</span><span class="inf-num inf-num-tot">${t.tot}</span></div>`
      +soldRow
      +`<div class="inf-row inf-dsp-r"><span class="inf-lbl">Disp.</span><span class="inf-num inf-num-dsp" id="dsp-${t.id}">${t.tot-t.sold}</span></div>`
      +`</td>`;

    // ROW 1: Ritmo ventas — read-only
    const _ri1=ri++;
    rows+=`<tr><td class="lbl lbl-sales">↗ Ritmo ventas</td>`
      +infPanel
      +vis.map((m,ci)=>{const v=rhm[m];return `<td class="cv-cell${v?' c-sales':''}" data-ri="${_ri1}" data-ci="${ci}" data-v="${v||0}">${v||''}</td>`;}).join('')+`</tr>`;

    // ROW 2: Ventas acumuladas (número)
    const _ri2=ri++;
    rows+=`<tr><td class="lbl lbl-acum">📊 Vtas acum. (N°)</td>`
      +vis.map((m,ci)=>{const cs=cumSold(t,m);return `<td class="cv-cell c-acum" data-ri="${_ri2}" data-ci="${ci}" data-v="${cs}">${cs}</td>`;}).join('')+`</tr>`;

    // ROW 3: % Ventas acum.
    const _ri3=ri++;
    rows+=`<tr><td class="lbl lbl-pct">% Ventas acum.</td>`
      +vis.map((m,i)=>{
        const c=cumSold(t,m),p=c/t.tot;
        const pp=i>0?cumSold(t,vis[i-1])/t.tot:t.sold/t.tot;
        const isFirst=p>=0.7&&pp<0.7,cross60=p>=0.6&&p<0.7&&pp<0.6,past=p>=0.7&&!isFirst;
        const cls=isFirst?'c-pe':cross60?'c-p60':past?'c-p70':'';
        const tip=isFirst?' title="🚦 Punto de equilibrio alcanzado"':'';
        return `<td class="cv-cell ${cls}" data-ri="${_ri3}" data-ci="${i}" data-v="${(p*100).toFixed(0)}"${tip}>${(p*100).toFixed(0)}%</td>`;
      }).join('')+`</tr>`;

    // ROW 4: Construcción (C = obra, E = lista para entrega)
    const _ri4=ri++;
    rows+=`<tr><td class="lbl lbl-con">🏗 Construcción</td>`
      +vis.map((m,ci)=>{
        if(cM.has(m)) return `<td class="cv-cell c-con" data-ri="${_ri4}" data-ci="${ci}" data-v="1">C</td>`;
        if(eM.has(m)) return `<td class="cv-cell c-econ" data-ri="${_ri4}" data-ci="${ci}" data-v="1">E</td>`;
        return `<td class="cv-cell" data-ri="${_ri4}" data-ci="${ci}" data-v="0"></td>`;
      }).join('')+`</tr>`;

    // ROW 5: Entregas clientes — read-only
    const _ri5=ri++;
    rows+=`<tr><td class="lbl lbl-del">🏠 Entregas clientes</td>`
      +vis.map((m,ci)=>{const d=del[m];return `<td class="cv-cell${d?' c-del':''}" data-ri="${_ri5}" data-ci="${ci}" data-v="${d||0}">${d||''}</td>`;}).join('')+`</tr>`;

    // ROW 6: Hitos — read-only
    ri++;
    rows+=`<tr><td class="lbl lbl-hit">📋 Hitos</td>`
      +vis.map(m=>{
        const ms=mil.filter(x=>x.date===m);
        if(!ms.length) return `<td></td>`;
        const tags=ms.map(x=>{
          const ab=x.type.split(' ').map(w=>w[0]).join('');
          return `<span class="hito-tag" title="${x.type}${x.desc?': '+x.desc:''}">${ab}</span>`;
        }).join('');
        return `<td class="c-hit">${tags}</td>`;
      }).join('')+`</tr>`;

    rows+=`<tr><td class="c-sep" colspan="${vis.length+2}"></td></tr>`;
  }

  const leg=[['#c8e6c9','Ritmo ventas'],['#fb8c00','PE 70%'],['#ffe0b2','Post-PE'],['#b0bec5','Construcción (C)'],['#b2dfdb','Lista entrega (E)'],['#f48fb1','Entregas'],['#bbdefb','Hitos']]
    .map(([bg,l])=>`<div class="leg-item"><div class="leg-dot" style="background:${bg}"></div>${l}</div>`).join('');

  const cpills=`<div class="croco-pill ${S.crocoProjFilter.length===0?'on':''}" onclick="toggleCF(null)">Todos</div>`
    +ALL_PROJS.map(p=>{const on=S.crocoProjFilter.includes(p);const col=PC[p]||'#2e7d32';return `<div class="croco-pill ${on?'on':''}" style="${on?`background:${col};border-color:${col}`:`color:${col};border-color:${col}`}" onclick="toggleCF('${p}')">${p}</div>`;}).join('');

  return `
    <div class="settings-bar">
      <span class="settings-label">⚙️ Fecha de referencia:</span>
      <select class="fi-sm" onchange="setCD(this.value)">${moOpts(S.currentDate,'2025-01','')}</select>
      <span style="font-size:12px;color:#aaa">Mostrando todos los años desde esta fecha</span>
      <span style="margin-left:auto;font-size:12px;color:#888">${vis.length} meses · ${shown.length} torres</span>
    </div>
    <div class="croco-filter">${cpills}</div>
    <div class="legend">${leg}</div>
    <div class="croco-wrap"><table class="ct"><thead><tr>${thYr}</tr><tr>${thMo}</tr></thead><tbody>${rows}</tbody></table>
    <div class="croco-statsbar" id="croco-statsbar"><span id="cs-avg"></span><span id="cs-cnt" style="margin-right:20px"></span><span id="cs-sum"></span><span style="float:right;cursor:pointer;opacity:0.7;font-weight:400;font-size:11px" onclick="_cvClear()">✕ Limpiar selección</span></div></div>
    <div style="margin-top:8px;font-size:11px;color:#aaa">💡 Arrastra sobre las celdas para ver <strong>Promedio · Recuento · Suma</strong> (como en Excel). <strong>Ritmo ventas</strong> y <strong>Entregas</strong>: clic para editar.</div>`;
}
function toggleCF(proj){
  if(proj===null){S.crocoProjFilter=[];}else{const i=S.crocoProjFilter.indexOf(proj);if(i>=0)S.crocoProjFilter.splice(i,1);else S.crocoProjFilter.push(proj);}
  draw();
}

// ── SELECTION STATS (like Excel status bar) ──
let _cvDrag=false,_cvR1=0,_cvC1=0,_cvR2=0,_cvC2=0;
function _cvUpdateSel(){
  const r1=Math.min(_cvR1,_cvR2),r2=Math.max(_cvR1,_cvR2);
  const c1=Math.min(_cvC1,_cvC2),c2=Math.max(_cvC1,_cvC2);
  let nums=[],cnt=0;
  document.querySelectorAll('td.cv-cell').forEach(td=>{
    const ri=+td.dataset.ri,ci=+td.dataset.ci;
    const inS=(ri>=r1&&ri<=r2&&ci>=c1&&ci<=c2);
    td.classList.toggle('sel',inS);
    if(inS){cnt++;const v=+td.dataset.v;if(!isNaN(v)&&v>0)nums.push(v);}
  });
  const bar=document.getElementById('croco-statsbar');if(!bar)return;
  if(cnt===0){bar.style.display='none';return;}
  bar.style.display='block';
  const fmt=v=>v%1===0?v.toString():v.toFixed(1);
  const cntEl=document.getElementById('cs-cnt');
  const avgEl=document.getElementById('cs-avg');
  const sumEl=document.getElementById('cs-sum');
  if(cntEl)cntEl.textContent='Recuento: '+cnt;
  if(nums.length>0){
    const sum=nums.reduce((a,b)=>a+b,0);
    if(sumEl)sumEl.textContent='Suma: '+fmt(sum);
    if(avgEl)avgEl.textContent='Promedio: '+fmt(sum/nums.length)+'  ·  ';
  } else {if(sumEl)sumEl.textContent='';if(avgEl)avgEl.textContent='';}
}
function _cvClear(){
  document.querySelectorAll('td.cv-cell.sel').forEach(td=>td.classList.remove('sel'));
  const bar=document.getElementById('croco-statsbar');if(bar)bar.style.display='none';
  _cvDrag=false;
}
function _initCrocoSel(){
  const wrap=document.querySelector('.croco-wrap');
  if(!wrap||wrap._selInited)return;
  wrap._selInited=true;
  wrap.addEventListener('mousedown',e=>{
    const td=e.target.closest('td.cv-cell');
    if(!td){_cvClear();return;}
    _cvDrag=true;_cvR1=_cvR2=+td.dataset.ri;_cvC1=_cvC2=+td.dataset.ci;
    _cvUpdateSel();e.preventDefault();
  });
  wrap.addEventListener('mouseover',e=>{
    if(!_cvDrag)return;
    const td=e.target.closest('td.cv-cell');
    if(!td)return;
    _cvR2=+td.dataset.ri;_cvC2=+td.dataset.ci;_cvUpdateSel();
  });
  document.addEventListener('mouseup',()=>{_cvDrag=false;});
  document.addEventListener('click',e=>{
    if(!e.target.closest('.croco-wrap')&&!e.target.closest('#croco-statsbar'))_cvClear();
  });
}

    <div class="finfo finfo-gray">🏗 Los meses de obra se marcarán como <strong>C</strong> en el Crocoveen.</div>`;

  if(area==='proyectos') flds=`${projSel}
    <div class="fg"><label class="fl">Tipo de hito</label><select class="fi" id="ft">
      <option value="">— Seleccionar —</option>

      <option>Estudio de Suelos</option><option>Diseños Estructurales</option><option>Escrituración</option><option>Otro</option>
    </select></div>
    <div class="fg"><label class="fl">Fecha programada</label><select class="fi" id="fm">${moOpts(opts.month||S.currentDate,'','')}</select></div>

  if(area==='equipo'){
    return `<div class="modal-bg" onclick="closeM()"><div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-hdr"><div><div class="modal-title" style="color:#00838f">👥 Equipo</div>
      <div class="modal-sub">Configura las personas disponibles para asignar tareas</div></div>
      <button class="modal-x" onclick="closeM()">×</button></div>
      <div id="eq-list" style="margin-bottom:16px">${buildEqList()}</div>
      <div style="display:flex;gap:8px">
        <input type="text" class="fi" id="new-person" placeholder="Nombre completo" style="flex:1"
          onkeydown="if(event.key==='Enter'){addPerson(this.value);}" >
        <button class="btn btn-grn" onclick="addPerson(document.getElementById('new-person').value)">Agregar</button>
      </div>
    </div></div>`;
  }

  return `<div class="modal-bg" onclick="closeM()"><div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-hdr"><div><div class="modal-title" style="color:${cfg.color}">${cfg.icon} ${cfg.title}</div><div class="modal-sub">${cfg.sub}</div></div>
    <button class="modal-x" onclick="closeM()">×</button></div>
    ${flds}
    <div class="form-btns"><button class="btn btn-grn" style="flex:1" onclick="saveM('${area}')">Guardar</button><button class="btn btn-out" onclick="closeM()">Cancelar</button></div>
  </div></div>`;
}

// ── INLINE EDITING — RITMO VENTAS ──

function saveCell(tid,month){

  if(el){const v=parseInt(el.value);if(!isNaN(v)&&v>=0){if(v===0){if(S.rhythm[tid])delete S.rhythm[tid][month];}else{if(!S.rhythm[tid])S.rhythm[tid]={};S.rhythm[tid][month]=v;}}}

}
function cellKey(e,tid,month){

// ── PROCESOS ──────────────────────────────────────────
const PROC_CFG={
  comercial:{color:'#43a047',label:'Comercial',icon:'💰'},
  tramites:{color:'#1e88e5',label:'Trámites',icon:'📑'},
  construccion:{color:'#757575',label:'Construcción',icon:'🏗'},
  proyectos:{color:'#8e24aa',label:'Proyectos',icon:'📋'},
};

function buildProcEvents(){
  const evs=[];
  const filt=S.procFilter;
  const all=!filt.length;

  // PROYECTOS: hitos futuros
  if(all||filt.includes('proyectos')){
    for(const m of S.milestones){
      if(m.date<S.currentDate) continue;
      const t=S.towers.find(x=>x.id===m.tid);
      evs.push({date:m.date,proc:'proyectos',text:m.type,desc:m.desc||'',tower:t?t.name:'',proj:t?t.proj:''});
    }
  }

  // CONSTRUCCION: inicios y fines próximos
  if(all||filt.includes('construccion')){
    for(const t of S.towers){
      const c=S.constr[t.id];
      if(!c) continue;
      if(c.start>S.currentDate) evs.push({date:c.start,proc:'construccion',text:'Inicio de construcción',tower:t.name,proj:t.proj});
      if(c.end>=S.currentDate)   evs.push({date:c.end,  proc:'construccion',text:'Fin de construcción',  tower:t.name,proj:t.proj});
    }
  }

  // TRAMITES: inicio de entregas a clientes
  if(all||filt.includes('tramites')){
    for(const t of S.towers){
      const dms=Object.keys(S.deliveries[t.id]||{}).filter(m=>m>=S.currentDate).sort();
      if(dms.length) evs.push({date:dms[0],proc:'tramites',text:'Inicio de entregas a clientes',tower:t.name,proj:t.proj});
    }
  }

  // COMERCIAL: inicio de preventas + PE proyectado
  if(all||filt.includes('comercial')){
    for(const t of S.towers){
      const st=status(t);
      // PE proyectado para torres en ventas
      if(st==='ventas'){
        const be=beMon(t);
        if(be&&be!=='already'&&be>=S.currentDate)
          evs.push({date:be,proc:'comercial',text:'PE proyectado (70%)',tower:t.name,proj:t.proj});
      }
      // Inicio de preventa para torres pendientes
      if(st==='pend'){
        const next=Object.keys(S.rhythm[t.id]||{}).filter(m=>m>=S.currentDate).sort()[0];
        if(next) evs.push({date:next,proc:'comercial',text:'Inicio de preventa programada',tower:t.name,proj:t.proj});
      }
    }
  }

  evs.sort((a,b)=>a.date.localeCompare(b.date));
  return evs;
}

function rProc(){
  const evs=buildProcEvents();

  // Group by month
  const byMonth={};
  for(const ev of evs){
    if(!byMonth[ev.date]) byMonth[ev.date]=[];
    byMonth[ev.date].push(ev);
  }

  const months=Object.keys(byMonth).sort();

  // Filter pills
  const pills=['todos','comercial','tramites','construccion','proyectos'].map(k=>{
    if(k==='todos'){
      const on=!S.procFilter.length;
      return `<div class="pill ${on?'on':''}" onclick="toggleProcF(null)">Todos</div>`;
    }
    const cfg=PROC_CFG[k];const on=S.procFilter.includes(k);
    return `<div class="pill ${on?'on':''}" style="${on?`background:${cfg.color};border-color:${cfg.color}`:`color:${cfg.color};border-color:${cfg.color}`}" onclick="toggleProcF('${k}')">${cfg.icon} ${cfg.label}</div>`;
  }).join('');

  const body=months.length
    ? months.map(mo=>{
        const items=byMonth[mo].map(ev=>{
          const cfg=PROC_CFG[ev.proc];
          const col=PC[ev.proj]||'#888';
          return `<div class="proc-item">
            <span class="proc-badge" style="background:${cfg.color}18;color:${cfg.color};border:1px solid ${cfg.color}40">${cfg.icon} ${cfg.label}</span>
            <span class="proc-text">${ev.text}</span>
            <span class="proc-tower" style="color:${col}">${ev.tower}</span>
            <span class="proc-proj">${ev.proj}</span>
            ${ev.desc?`<span class="proc-desc">${ev.desc}</span>`:''}
          </div>`;
        }).join('');
        return `<div class="proc-month"><div class="proc-month-hdr">${ml(mo)}</div><div class="proc-items">${items}</div></div>`;
      }).join('')
    : `<p style="padding:40px;text-align:center;color:#bbb;font-size:14px">No hay eventos próximos para los filtros seleccionados.</p>`;

  return `<div class="filter-bar"><div class="filter-label">Filtrar por proceso</div><div class="filter-pills">${pills}</div></div>
    <div class="proc-timeline">${body}</div>`;
}
function toggleProcF(k){
  if(k===null){S.procFilter=[];}
  else{const i=S.procFilter.indexOf(k);if(i>=0)S.procFilter.splice(i,1);else S.procFilter.push(k);}
  draw();
}

// ── TAREAS ────────────────────────────────────────────
function getDone(){return SBC.done;}
function toggleTask(id){
  const wasDone=SBC.done.has(id);
  if(wasDone)SBC.done.delete(id);else SBC.done.add(id);
  draw();
  sbUpsert('task_completions',{task_id:id,done:!wasDone,completed_at:!wasDone?new Date().toISOString():null});
}

function badgeCls(type){
  const t=(type||'').toLowerCase();
  if(t==='pe'||t.includes('punto de equilibrio')||t.includes('70%')) return 'bdg-pe';
  if(t.includes('rph')) return 'bdg-rph';
  if(t.includes('lic')) return 'bdg-lic';
  if(t.includes('obra')||t.includes('constr')) return 'bdg-obra';
  if(t.includes('entrega')) return 'bdg-ent';
  return 'bdg-def';
}

function buildTasks(){
  const tasks=[];
  const done=getDone();
  // 1. Hitos registrados — solo los futuros o los que el usuario marcó como completados
  // (si un hito ya pasó y nadie lo marcó, se asume cumplido y no genera tarea pendiente)
  for(const m of S.milestones){
    if(m.date && m.date < S.currentDate && !done.has('m'+m.id)) continue;
    const t=S.towers.find(x=>x.id===m.tid);
    tasks.push({id:'m'+m.id,tid:m.tid,proj:t?t.proj:'',name:m.desc||m.type,type:m.type,date:m.date,tower:t?t.name:m.tid});
  }
  // 2. "70% en ventas" automático por torre (hito comercial para iniciar obra)
  for(const t of S.towers){
    const tgt=t.tot*0.7;
    if(t.sold>=tgt) continue; // ya alcanzó el 70%, no genera tarea pendiente
    const m70=beMon(t); // mes proyectado en que alcanza 70%
    tasks.push({id:'pe_'+t.id,tid:t.id,proj:t.proj,name:'70% en ventas',type:'PE',date:m70||null,tower:t.name,auto:true});
  }
  return tasks;
}
function toggleTareasF(k){
  if(k===null){S.tareasFilter=[];}
  else{const i=S.tareasFilter.indexOf(k);if(i>=0)S.tareasFilter.splice(i,1);else S.tareasFilter.push(k);}
  draw();
}

function rTareas(){
  const done=getDone();
  const owners=getOwners();
  const people=getPeople();
  const showDone=S.tareasShowDone;
  const allTasks=buildTasks();
  const pendCount=allTasks.filter(tk=>!done.has(tk.id)).length;
  const doneCount=allTasks.filter(tk=>done.has(tk.id)).length;

  // Filtro de proyectos activo
  const filt=S.tareasFilter;
  const base=showDone?allTasks.filter(tk=>done.has(tk.id)):allTasks.filter(tk=>!done.has(tk.id));
  const visible=filt.length?base.filter(tk=>filt.includes(tk.proj)):base;

  // Agrupar por proyecto y ordenar por fecha
  const byProj={};
  for(const tk of visible){
    if(!byProj[tk.proj]) byProj[tk.proj]=[];
    byProj[tk.proj].push(tk);
  }
  for(const p of Object.keys(byProj)) byProj[p].sort((a,b)=>{
    if(!a.date&&!b.date) return 0;
    if(!a.date) return 1;
    if(!b.date) return -1;
    return a.date<b.date?-1:1;
  });

  const soon3=addM(S.currentDate,3);
  function dateCls(d){
    if(!d) return '';
    if(d<S.currentDate) return 'tk-over';
    if(d<=soon3) return 'tk-soon';
    return '';
  }

  // ── Barra de filtro de proyectos ──
  const projsWithTasks=[...new Set(allTasks.map(tk=>tk.proj))].filter(p=>ALL_PROJS.includes(p));
  let filterBar=`<div class="filter-bar" style="margin-bottom:14px">
    <div class="filter-label">Proyecto</div>
    <div class="filter-pills">
      <div class="pill${!filt.length?' on':''}" onclick="toggleTareasF(null)">Todos</div>`;
  for(const proj of projsWithTasks){
    const color=PC[proj]||'#546e7a';
    const on=filt.includes(proj);
    filterBar+=`<div class="pill${on?' on':''}" style="${on?`background:${color};border-color:${color};color:#fff`:`border-color:${color};color:${color}`}" onclick="toggleTareasF('${proj.replace(/'/g,"\\'")}')">${proj}</div>`;
  }
  filterBar+=`</div></div>`;

  // ── Header ──
  let html=`<div class="tk-hdr">
    <div class="tk-lbl">✅ Tareas del proyecto</div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div class="tk-stats">
        <button class="tk-n${!showDone?' tk-pend':''}" onclick="S.tareasShowDone=false;draw()">${pendCount} pendiente${pendCount!==1?'s':''}</button>
        <button class="tk-n${showDone?' tk-pend':''}" onclick="S.tareasShowDone=true;draw()">${doneCount} completada${doneCount!==1?'s':''}</button>
      </div>
      <button class="tk-add" onclick="openM('proyectos')">+ Agregar hito</button>
    </div>
  </div>`;
  html+=filterBar;

  const hasAny=ALL_PROJS.some(p=>byProj[p]&&byProj[p].length);
  if(!hasAny){
    html+=`<div class="tk-empty">🎉 No hay tareas ${showDone?'completadas':'pendientes'}</div>`;
    return html;
  }

  for(const proj of ALL_PROJS){
    const tks=byProj[proj];
    if(!tks||!tks.length) continue;
    const color=PC[proj]||'#546e7a';
    html+=`<div class="tk-section">
      <div class="tk-sec-hdr" style="background:${color}">
        <div style="display:flex;align-items:center">
          <div class="tk-proj-dot"></div>
          <span class="tk-proj-name">${proj}</span>
          <span class="tk-proj-cnt">${tks.length} tarea${tks.length!==1?'s':''}</span>
        </div>
      </div>
      <div class="tk-body">`;
    for(const tk of tks){
      const isDone=done.has(tk.id);
      const dc=dateCls(tk.date);
      const chkSvg=isDone?`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6.5l3 3 5-5.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:'';
      const dateLabel=tk.date?`<span class="tk-date ${dc}">${ml(tk.date)}</span>`:`<span class="tk-date" style="color:#ccc">Sin fecha</span>`;
      const owner=owners[tk.id]||'';
      // Owner picker: avatar + select dropdown
      const avatarHtml=owner
        ? rAvatar(owner)
        : `<span class="tk-avatar tk-avatar-empty" title="Sin responsable">+</span>`;
      const ownerOpts=`<option value="">Sin responsable</option>`
        +people.map(p=>`<option value="${p}"${p===owner?' selected':''}>${p}</option>`).join('')
        +`<option value="__add__">➕ Agregar persona...</option>`;
      const ownerPicker=`<div style="display:flex;align-items:center;gap:5px">${avatarHtml}
          <select class="tk-owner-sel" onclick="event.stopPropagation()"
            onchange="(function(s,id,cur){if(s.value==='__add__'){s.value=cur;openM('equipo');}else{setOwner(id,s.value);}})(this,'${tk.id}','${owner}')">${ownerOpts}</select>
         </div>`;
      html+=`<div class="tk-row${isDone?' tk-row-done':''}">
        <div class="tk-circle${isDone?' tk-circle-done':''}" onclick="toggleTask('${tk.id}')" title="${isDone?'Desmarcar':'Marcar como completada'}">${chkSvg}</div>
        <div style="flex:1;min-width:0">
          <span class="tk-task-name">${tk.name}</span><span class="tk-stk">${tk.tower}</span>
        </div>
        <div class="tk-right">
          ${ownerPicker}
          <span class="tk-badge ${badgeCls(tk.type)}">${tk.type}</span>
          ${dateLabel}
        </div>
      </div>`;
    }
    html+=`</div></div>`;
  }
  return html;
}

// ── CORE ──────────────────────────────────────────────
function go(v){S.view=v;S.editCell=null;S.editDel=null;S.editSold=null;document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));const el=document.getElementById('tab-'+v);if(el)el.classList.add('active');draw();}
function setCD(d){S.currentDate=d;const el=document.getElementById('hdr-date');if(el)el.textContent=ml(d);draw();}
function openM(area,opts){document.getElementById('modal-root').innerHTML=rModal(area,opts||{});}
function closeM(){document.getElementById('modal-root').innerHTML='';}
function gv(id){const e=document.getElementById(id);return e?e.value.trim():'';}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3200);}

function saveM(area){
  const tid=gv('ftw');if(!tid){alert('Por favor selecciona una torre.');return;}
  const t=S.towers.find(x=>x.id===tid);
  if(area==='comercial'){
    const mo=gv('fm'),qStr=gv('fq'),qty=parseInt(qStr)||0,soldStr=gv('fs');
    if(qStr!==''){if(qty>0){if(!S.rhythm[tid])S.rhythm[tid]={};S.rhythm[tid][mo]=qty;}else if(S.rhythm[tid])delete S.rhythm[tid][mo];}
    if(soldStr!==''){const s=parseInt(soldStr);if(!isNaN(s)&&s>=0&&s<=t.tot)S.towers=S.towers.map(x=>x.id===tid?{...x,sold:s}:x);}
    toast(`✅ Comercial: ${t.name} actualizado`);
  }else if(area==='tramites'){
    const mo=gv('fm'),qty=parseInt(gv('fq'));if(!qty||qty<=0){alert('Ingresa una cantidad válida.');return;}
    if(!S.deliveries[tid])S.deliveries[tid]={};S.deliveries[tid][mo]=qty;
    toast(`✅ Trámites: ${qty} cierres en ${ml(mo)}`);
  }else if(area==='construccion'){
    const s=gv('fs2'),meses=parseInt(document.getElementById('fmeses')?.value||'0');
    if(!s||meses<=0){alert('Selecciona el mes de inicio y los meses de obra.');return;}
    const e=addM(s,meses-1);S.constr[tid]={start:s,end:e};
    toast(`✅ Construcción: ${ml(s)} – ${ml(e)} (${meses} meses) para ${t.name}`);
  }else if(area==='proyectos'){
    const tp=gv('ft'),mo=gv('fm'),desc=gv('fd');if(!tp){alert('Selecciona el tipo de hito.');return;}
    S.milestones.push({id:Date.now(),tid,type:tp,date:mo,desc});
    toast(`✅ Hito "${tp}" en ${ml(mo)}`);
  }
  closeM();draw();
}

function draw(){
  const el=document.getElementById('content');if(!el)return;
  if(S.view==='dashboard') el.innerHTML=rDash();
  else if(S.view==='crocoveen'){el.innerHTML=rCroco();_initCrocoSel();}
  else if(S.view==='procesos') el.innerHTML=rProc();
  else if(S.view==='registrar') el.innerHTML=rReg();
  else if(S.view==='tareas') el.innerHTML=rTareas();
}
initSupabase();
</script>

<script>
const PW_HASH='910430227a29285f3fc0b23d279be34a5efe722c6851fbee79b6405d522223ee';
const SESSION_KEY='crocoveen_auth';
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function doLogin(){
  const pw=document.getElementById('login-pw').value;
  const h=await sha256(pw);
  if(h===PW_HASH){
    sessionStorage.setItem(SESSION_KEY,'1');
    document.getElementById('login-overlay').style.display='none';
  } else {
    document.getElementById('login-err').textContent='Contraseña incorrecta';
    document.getElementById('login-pw').value='';
    document.getElementById('login-pw').focus();
  }
}
// Comprobar si ya está autenticado en esta sesión
(function(){
  if(sessionStorage.getItem(SESSION_KEY)==='1'){
    document.addEventListener('DOMContentLoaded',function(){
      const ov=document.getElementById('login-overlay');
      if(ov) ov.style.display='none';
    });
  }
})();
</script>
